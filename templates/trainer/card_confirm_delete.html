{% extends "base.html" %}

{% block title %}Удаление карточки{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-lg-6">
        <div class="card border-0 shadow-sm">
            <div class="card-body p-4 p-lg-5 text-center">
                <h1 class="h2 mb-3">Удаление карточки</h1>
                <p class="text-muted mb-4">
                    Вы действительно хотите удалить карточку
                    <strong>{{ object.word }}</strong> — <strong>{{ object.translation }}</strong>?
                </p>
                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex justify-content-center flex-wrap gap-2">
                        <button type="submit" class="btn btn-danger">Да, удалить</button>
                        <a href="{% url 'trainer:card_detail' object.pk %}" class="btn btn-outline-secondary">Отмена</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
